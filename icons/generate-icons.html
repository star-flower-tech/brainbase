<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>このページをブラウザで開いて、アイコンを生成・保存してください。</p>
<canvas id="c192" width="192" height="192" style="display:block;margin:10px"></canvas>
<button onclick="save(192)">icon-192.png を保存</button>
<br><br>
<canvas id="c512" width="512" height="512" style="display:block;margin:10px"></canvas>
<button onclick="save(512)">icon-512.png を保存</button>
<script>
function draw(size) {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#7C5CFC';
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.55}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('B', size / 2, size / 2 + size * 0.04);
}
function save(size) {
  const c = document.getElementById('c' + size);
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}
draw(192);
draw(512);
</script>
</body>
</html>
