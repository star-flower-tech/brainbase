<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BrainBase">
  <meta name="theme-color" content="#7C5CFC">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>BrainBase</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>

  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bb: {
              bg:      '#F5F5FA',
              surface: '#FFFFFF',
              card:    '#FFFFFF',
              border:  '#E4E4F0',
              accent:  '#7C5CFC',
              success: '#22C55E',
              warn:    '#F59E0B',
              error:   '#EF4444',
              muted:   '#9898B8',
              text:    '#1A1A35',
              text2:   '#5C5C80',
            }
          },
          boxShadow: {
            card: '0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04)',
            'card-md': '0 4px 16px rgba(0,0,0,0.10)',
          }
        }
      }
    }
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { background: #F5F5FA; overscroll-behavior: none; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; }
    .pb-safe { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    [x-cloak] { display: none !important; }
    .card-press:active { transform: scale(0.98); }
    input[type=range] { accent-color: #7C5CFC; }
    .seg-active   { background: #7C5CFC; color: #fff; }
    .seg-inactive { background: transparent; color: #9898B8; }
    .prog-track { background: #E4E4F0; border-radius: 99px; overflow: hidden; }
    .prog-fill  { border-radius: 99px; transition: width 0.5s ease; }
  </style>
</head>

<body class="text-bb-text" x-data="brainbase()" x-init="init()" x-cloak>
<div class="max-w-[430px] mx-auto min-h-screen flex flex-col bg-bb-bg">

  <!-- ===== HEADER ===== -->
  <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md shadow-[0_1px_0_#E4E4F0]">
    <div class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white text-sm font-bold"
             style="background: linear-gradient(135deg, #7C5CFC, #9F7AEA);">B</div>
        <div>
          <p class="text-[10px] text-bb-muted leading-none">BrainBase</p>
          <p class="text-[13px] font-semibold leading-snug" x-text="pageTitles[currentPage]"></p>
        </div>
      </div>
      <div class="flex gap-1">
        <button x-show="currentPage === 'tasks'" @click="taskTab = taskTab==='tasks'?'goals':'tasks'"
                class="text-[11px] px-3 py-1.5 rounded-full border border-bb-border text-bb-text2 font-medium">
          <span x-text="taskTab === 'tasks' ? 'ゴール表示' : 'タスク表示'"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="flex-1 overflow-y-auto pb-24">

    <!-- ==================== TODAY ==================== -->
    <div x-show="currentPage === 'today'">
      <div class="px-4 pt-5 pb-1">
        <p class="text-bb-muted text-xs mb-0.5" x-text="todayDateStr"></p>
        <h2 class="text-xl font-bold text-bb-text" x-text="greetingText"></h2>
      </div>
      <div class="px-4 py-3 grid grid-cols-3 gap-2">
        <div class="bg-white rounded-2xl p-3 shadow-card">
          <p class="text-[10px] text-bb-muted mb-1">未完了タスク</p>
          <p class="text-2xl font-bold text-bb-accent" x-text="todayStats.tasks"></p>
        </div>
        <div class="bg-white rounded-2xl p-3 shadow-card">
          <p class="text-[10px] text-bb-muted mb-1">完了済み</p>
          <p class="text-2xl font-bold text-bb-success" x-text="todayStats.done"></p>
        </div>
        <div class="bg-white rounded-2xl p-3 shadow-card">
          <p class="text-[10px] text-bb-muted mb-1">アイデア</p>
          <p class="text-2xl font-bold text-bb-warn" x-text="todayStats.ideas"></p>
        </div>
      </div>
      <div class="px-4 py-2">
        <button @click="generateAITasks()" :disabled="aiTasksLoading"
                class="w-full rounded-2xl p-4 flex items-center gap-3 transition-transform card-press shadow-card-md"
                style="background: linear-gradient(135deg, #7C5CFC 0%, #9F7AEA 100%);">
          <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg x-show="!aiTasksLoading" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            <svg x-show="aiTasksLoading" class="w-5 h-5 text-white animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </div>
          <div class="text-left flex-1">
            <p class="text-white font-bold text-sm" x-text="aiTasksLoading ? '生成中...' : 'AIで今日のタスクを提案'"></p>
            <p class="text-white/70 text-xs mt-0.5">ゴールから今日やることを自動で生成</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-white/60 flex-shrink-0"></i>
        </button>
      </div>
      <template x-if="aiSuggestedTasks.length > 0">
        <div class="px-4 py-2">
          <div class="bg-white rounded-2xl shadow-card p-4">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <span class="text-xs font-semibold text-bb-accent">✨ AI提案</span>
                <span class="text-[10px] bg-bb-accent/10 text-bb-accent px-2 py-0.5 rounded-full" x-text="aiSuggestedTasks.length + '件'"></span>
              </div>
              <button @click="adoptAllAITasks()" class="text-[11px] bg-bb-accent text-white px-3 py-1.5 rounded-full font-medium">全部追加</button>
            </div>
            <template x-for="(task, i) in aiSuggestedTasks" :key="i">
              <div class="flex items-start gap-2 py-2 border-t border-bb-border first:border-0">
                <div class="flex-1 min-w-0">
                  <p class="text-sm text-bb-text font-medium" :class="task.adopted ? 'line-through text-bb-muted' : ''" x-text="task.title"></p>
                  <div class="flex items-center gap-2 mt-1">
                    <template x-if="businessById(task.businessId)">
                      <span class="text-[10px] px-2 py-0.5 rounded-full text-white" :style="'background:' + (businessById(task.businessId)?.color || '#888')" x-text="businessById(task.businessId)?.icon + ' ' + businessById(task.businessId)?.name"></span>
                    </template>
                    <span class="text-[10px] text-bb-muted" x-text="task.reason"></span>
                  </div>
                </div>
                <button @click="adoptAITask(task, i)" :disabled="task.adopted" :class="task.adopted ? 'bg-bb-success/10 text-bb-success' : 'bg-bb-accent/10 text-bb-accent'" class="text-[11px] px-2.5 py-1.5 rounded-lg font-medium flex-shrink-0 transition-colors">
                  <span x-text="task.adopted ? '追加済み' : '追加'"></span>
                </button>
              </div>
            </template>
          </div>
        </div>
      </template>
      <div class="px-4 py-2">
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider">事業進捗</p>
          <button @click="navigate('tasks'); taskTab='goals'" class="text-[11px] text-bb-accent">ゴールを管理</button>
        </div>
        <template x-if="businesses.length === 0"><p class="text-sm text-bb-muted">事業が登録されていません</p></template>
        <template x-for="biz in businesses" :key="biz.id">
          <div class="bg-white rounded-2xl shadow-card p-4 mb-2">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2">
                <span class="text-base" x-text="biz.icon"></span>
                <span class="text-sm font-semibold text-bb-text" x-text="biz.name"></span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] text-bb-muted" x-text="tasksForBusiness(biz.id) + '件のタスク'"></span>
                <span class="text-sm font-bold" :style="'color:' + biz.color" x-text="businessProgress(biz.id) + '%'"></span>
              </div>
            </div>
            <div class="prog-track h-1.5"><div class="prog-fill h-full" :style="'width:' + businessProgress(biz.id) + '%; background:' + biz.color"></div></div>
            <div class="mt-2 space-y-1">
              <template x-for="goal in goalsForBusiness(biz.id).slice(0,2)" :key="goal.id">
                <p class="text-[11px] text-bb-muted truncate" x-text="'・' + goal.title + '  ' + (goal.progress||0) + '%'"></p>
              </template>
              <template x-if="goalsForBusiness(biz.id).length === 0"><p class="text-[11px] text-bb-muted">ゴール未設定</p></template>
            </div>
          </div>
        </template>
      </div>
      <div class="px-4 py-2 pb-4">
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider">今日のタスク</p>
          <button @click="navigate('tasks')" class="text-[11px] text-bb-accent">すべて見る</button>
        </div>
        <template x-if="todayTasks.length === 0">
          <div class="bg-white rounded-2xl shadow-card p-5 text-center"><p class="text-sm text-bb-muted">今日期限のタスクはありません</p></div>
        </template>
        <template x-for="task in todayTasks" :key="task.id">
          <div class="bg-white rounded-2xl shadow-card p-4 mb-2 flex items-center gap-3 card-press">
            <button @click="toggleTask(task.id)" :class="task.done ? 'bg-bb-success border-bb-success' : 'border-bb-border bg-white'" class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all">
              <i x-show="task.done" data-lucide="check" class="w-3 h-3 text-white"></i>
            </button>
            <div class="flex-1 min-w-0">
              <p :class="task.done ? 'line-through text-bb-muted' : 'text-bb-text'" class="text-sm font-medium truncate" x-text="task.title"></p>
              <div class="flex items-center gap-1.5 mt-0.5">
                <template x-if="businessById(task.businessId)"><span class="text-[10px] px-1.5 py-0.5 rounded-full text-white mt-1 inline-block" :style="'background:' + businessById(task.businessId)?.color" x-text="businessById(task.businessId)?.name"></span></template>
                <span x-show="task.source === 'claude'" class="text-[10px] bg-bb-accent/10 text-bb-accent px-1.5 py-0.5 rounded-full">🤖 Claude</span>
              </div>
            </div>
            <span x-show="task.priority === 'high'" class="w-1.5 h-1.5 rounded-full bg-bb-warn flex-shrink-0"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- ==================== TASKS ==================== -->
    <div x-show="currentPage === 'tasks'">
      <div x-show="taskTab === 'tasks'">
        <div class="px-4 pt-4 flex gap-2 overflow-x-auto pb-3">
          <template x-for="f in taskFilters" :key="f.key">
            <button @click="activeFilter = f.key" :class="activeFilter === f.key ? 'bg-bb-accent text-white shadow-card' : 'bg-white text-bb-text2 shadow-card'" class="px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-all" x-text="f.label"></button>
          </template>
        </div>
        <div class="px-4 pb-4">
          <template x-if="filteredTasks.length === 0">
            <div class="flex flex-col items-center gap-3 py-16">
              <div class="w-14 h-14 rounded-2xl bg-white shadow-card flex items-center justify-center"><i data-lucide="inbox" class="w-7 h-7 text-bb-muted"></i></div>
              <p class="text-bb-text2 text-sm">タスクがありません。＋ で追加してください</p>
            </div>
          </template>
          <template x-for="task in filteredTasks" :key="task.id">
            <div class="bg-white rounded-2xl shadow-card p-4 mb-2 card-press">
              <div class="flex items-start gap-3">
                <button @click="toggleTask(task.id)" :class="task.done ? 'bg-bb-success border-bb-success' : 'border-bb-border'" class="mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all">
                  <i x-show="task.done" data-lucide="check" class="w-3 h-3 text-white"></i>
                </button>
                <div class="flex-1 min-w-0">
                  <p :class="task.done ? 'line-through text-bb-muted' : 'text-bb-text'" class="text-sm font-medium" x-text="task.title"></p>
                  <div class="flex flex-wrap items-center gap-1.5 mt-1.5">
                    <template x-if="businessById(task.businessId)"><span class="text-[10px] px-2 py-0.5 rounded-full text-white" :style="'background:' + businessById(task.businessId)?.color" x-text="businessById(task.businessId)?.name"></span></template>
                    <span x-show="task.source === 'claude'" class="text-[10px] bg-bb-accent/10 text-bb-accent px-2 py-0.5 rounded-full">🤖 Claude</span>
                    <span x-show="task.dueDate" class="text-[10px] text-bb-muted" x-text="task.dueDate ? '期限 ' + task.dueDate : ''"></span>
                  </div>
                </div>
                <div class="flex items-center gap-1.5">
                  <span x-show="task.priority === 'high'" class="w-1.5 h-1.5 rounded-full bg-bb-warn flex-shrink-0"></span>
                  <button @click="deleteTask(task.id)" class="w-7 h-7 flex items-center justify-center text-bb-muted hover:text-bb-error transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
      <div x-show="taskTab === 'goals'">
        <div class="px-4 pt-4 pb-4">
          <template x-for="biz in businesses" :key="biz.id">
            <div class="mb-4">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                  <span class="text-base" x-text="biz.icon"></span>
                  <span class="font-semibold text-sm text-bb-text" x-text="biz.name"></span>
                  <span class="text-[11px] font-bold ml-1" :style="'color:' + biz.color" x-text="businessProgress(biz.id) + '%'"></span>
                </div>
                <button @click="openGoalModal(biz.id)" class="text-[11px] text-bb-accent border border-bb-accent/30 px-2.5 py-1 rounded-full">+ ゴール追加</button>
              </div>
              <div class="prog-track h-1.5 mb-3"><div class="prog-fill h-full" :style="'width:' + businessProgress(biz.id) + '%; background:' + biz.color"></div></div>
              <template x-if="goalsForBusiness(biz.id).length === 0">
                <div class="bg-white rounded-xl shadow-card p-4 text-center"><p class="text-xs text-bb-muted">ゴールがありません。追加してください。</p></div>
              </template>
              <template x-for="goal in goalsForBusiness(biz.id)" :key="goal.id">
                <div class="bg-white rounded-xl shadow-card p-3.5 mb-2">
                  <div class="flex items-start justify-between gap-2">
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium text-bb-text truncate" x-text="goal.title"></p>
                      <p x-show="goal.targetDate" class="text-[10px] text-bb-muted mt-0.5" x-text="'期限: ' + goal.targetDate"></p>
                    </div>
                    <div class="flex items-center gap-1">
                      <button @click="openProgressModal(goal)" class="text-[11px] font-bold px-2.5 py-1 rounded-lg" :style="'color:' + biz.color + '; background:' + biz.color + '15'" x-text="(goal.progress||0) + '%'"></button>
                      <button @click="deleteGoal(goal.id)" class="w-6 h-6 flex items-center justify-center text-bb-muted"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                    </div>
                  </div>
                  <div class="prog-track h-1 mt-2"><div class="prog-fill h-full" :style="'width:' + (goal.progress||0) + '%; background:' + biz.color"></div></div>
                </div>
              </template>
            </div>
          </template>
          <button @click="showBusinessModal = true; $nextTick(() => lucide.createIcons())" class="w-full bg-white shadow-card rounded-xl p-3.5 flex items-center justify-center gap-2 text-bb-muted text-sm border-2 border-dashed border-bb-border">
            <i data-lucide="plus-circle" class="w-4 h-4"></i><span>事業を追加</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ==================== IDEAS ==================== -->
    <div x-show="currentPage === 'ideas'">
      <div class="px-4 pt-4">
        <button @click="showMagicModal = true; $nextTick(() => lucide.createIcons())" class="w-full rounded-2xl p-4 flex items-center gap-3 shadow-card-md card-press" style="background: linear-gradient(135deg, #F59E0B, #FBBF24);">
          <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0"><i data-lucide="sparkles" class="w-5 h-5 text-white"></i></div>
          <div class="text-left">
            <p class="text-white font-bold text-sm">Magic Project</p>
            <p class="text-white/80 text-xs mt-0.5">アイデア → AIがタスクに分解</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-white/60 ml-auto"></i>
        </button>
      </div>
      <div class="px-4 py-4">
        <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider mb-3">アイデアメモ</p>
        <template x-if="ideas.length === 0">
          <div class="flex flex-col items-center gap-3 py-14">
            <div class="w-14 h-14 bg-white rounded-2xl shadow-card flex items-center justify-center"><i data-lucide="lightbulb" class="w-7 h-7 text-bb-muted"></i></div>
            <p class="text-bb-text2 text-sm">アイデアをメモしよう</p>
          </div>
        </template>
        <template x-for="idea in ideas" :key="idea.id">
          <div class="bg-white rounded-2xl shadow-card p-4 mb-2 card-press">
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-bb-text" x-text="idea.title"></p>
                <p x-show="idea.body" class="text-xs text-bb-muted mt-1 line-clamp-2" x-text="idea.body"></p>
                <p class="text-[10px] text-bb-muted mt-2" x-text="formatDate(idea.createdAt)"></p>
              </div>
              <button @click="deleteIdea(idea.id)" class="w-7 h-7 flex items-center justify-center text-bb-muted hover:text-bb-error"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ==================== POST ==================== -->
    <div x-show="currentPage === 'post'">
      <div class="px-4 pt-4">
        <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider mb-3">SNS 下書き</p>
        <template x-if="drafts.length === 0">
          <div class="flex flex-col items-center gap-3 py-14">
            <div class="w-14 h-14 bg-white rounded-2xl shadow-card flex items-center justify-center"><i data-lucide="pen-line" class="w-7 h-7 text-bb-muted"></i></div>
            <p class="text-bb-text2 text-sm">下書きがありません</p>
          </div>
        </template>
        <template x-for="draft in drafts" :key="draft.id">
          <div class="bg-white rounded-2xl shadow-card p-4 mb-2">
            <p class="text-sm text-bb-text line-clamp-4" x-text="draft.body"></p>
            <div class="flex items-center justify-between mt-3">
              <p class="text-[10px] text-bb-muted" x-text="formatDate(draft.createdAt)"></p>
              <div class="flex gap-2">
                <button @click="copyDraft(draft)" class="flex items-center gap-1 px-2.5 py-1.5 bg-bb-bg rounded-lg text-[11px] text-bb-text2"><i data-lucide="copy" class="w-3 h-3"></i> コピー</button>
                <button @click="postToX(draft)" class="flex items-center gap-1 px-2.5 py-1.5 bg-bb-text rounded-lg text-[11px] text-white">
                  <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                  投稿
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ==================== SETTINGS ==================== -->
    <div x-show="currentPage === 'settings'">
      <div class="px-4 pt-4 space-y-5 pb-6">
        <div>
          <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider mb-3">Claude Code 連携</p>
          <div class="bg-white rounded-2xl shadow-card p-4">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm font-medium text-bb-text">ローカルサーバー</p>
                <p class="text-[11px] text-bb-muted mt-0.5">localhost:3001</p>
              </div>
              <div class="flex items-center gap-2">
                <span x-show="isApiMode" class="text-xs text-bb-success font-medium">接続中 🟢</span>
                <span x-show="!isApiMode" class="text-xs text-bb-muted font-medium">未接続 🔴</span>
              </div>
            </div>
            <button @click="checkApiConnection()" class="mt-3 w-full text-xs py-2 rounded-xl border border-bb-border text-bb-text2 hover:bg-bb-bg transition-colors">接続テスト</button>
          </div>
        </div>
        <div>
          <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider mb-3">AI 設定</p>
          <div class="bg-white rounded-2xl shadow-card p-4 space-y-3">
            <div>
              <label class="text-xs text-bb-muted block mb-1.5">Claude API キー (BYOK)</label>
              <div class="flex gap-2">
                <input type="password" x-model="settings.claudeKey" placeholder="sk-ant-..." class="flex-1 bg-bb-bg border border-bb-border rounded-xl px-3 py-2.5 text-sm text-bb-text outline-none focus:border-bb-accent transition-colors">
                <button @click="saveSettings()" class="px-4 py-2.5 bg-bb-accent text-white text-xs rounded-xl font-medium">保存</button>
              </div>
              <p class="text-[10px] text-bb-muted mt-1.5">AIタスク提案・Magic Projectに使用。このデバイスのみに保存。</p>
            </div>
          </div>
        </div>
        <div>
          <p class="text-xs font-semibold text-bb-muted uppercase tracking-wider mb-3">アプリ情報</p>
          <div class="bg-white rounded-2xl shadow-card divide-y divide-bb-border">
            <div class="flex items-center justify-between px-4 py-3">
              <span class="text-sm text-bb-text">バージョン</span>
              <span class="text-sm text-bb-muted">v0.3.0</span>
            </div>
            <div class="flex items-center justify-between px-4 py-3">
              <span class="text-sm text-bb-text">データ保存</span>
              <span class="text-sm" x-text="isApiMode ? 'SQLite (ローカルAPI)' : 'IndexedDB (ブラウザ)'"></span>
            </div>
            <div class="flex items-center justify-between px-4 py-3">
              <span class="text-sm text-bb-text">制作</span>
              <span class="text-sm text-bb-muted">starflower</span>
            </div>
          </div>
        </div>
        <div>
          <p class="text-xs font-semibold text-red-400 uppercase tracking-wider mb-3">データ管理</p>
          <div class="bg-white rounded-2xl shadow-card p-4">
            <button @click="resetAllData()" class="w-full text-sm text-red-400 py-2.5 rounded-xl border border-red-200 hover:bg-red-50 transition-colors">すべてのデータを削除</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ===== FAB ===== -->
  <button @click="openAddModal()" x-show="currentPage !== 'settings'" class="fixed bottom-24 right-4 w-14 h-14 rounded-2xl flex items-center justify-center shadow-card-md transition-transform active:scale-95 z-40" style="background: linear-gradient(135deg, #7C5CFC, #9F7AEA);">
    <i data-lucide="plus" class="w-6 h-6 text-white"></i>
  </button>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white/95 backdrop-blur-md shadow-[0_-1px_0_#E4E4F0] z-50">
    <div class="flex items-center justify-around px-2 pt-2 pb-safe">
      <template x-for="item in [{page:'today',icon:'sun',label:'Today'},{page:'tasks',icon:'check-square',label:'Tasks'},{page:'ideas',icon:'lightbulb',label:'Ideas'},{page:'post',icon:'send',label:'Post'},{page:'settings',icon:'settings',label:'Settings'}]" :key="item.page">
        <button @click="navigate(item.page)" :class="currentPage === item.page ? 'text-bb-accent' : 'text-bb-muted'" class="flex flex-col items-center gap-1 px-3 py-1 transition-colors">
          <i :data-lucide="item.icon" class="w-5 h-5"></i>
          <span class="text-[9px] font-medium" x-text="item.label"></span>
        </button>
      </template>
    </div>
  </nav>

  <!-- ===== MODALS ===== -->
  <div x-show="showAddModal" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end justify-center" @click.self="showAddModal = false">
    <div x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0" class="w-full max-w-[430px] bg-white rounded-t-2xl p-5 shadow-card-md">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-bb-text" x-text="addModalTitle()"></h3>
        <button @click="showAddModal = false" class="w-7 h-7 flex items-center justify-center rounded-full bg-bb-bg"><i data-lucide="x" class="w-4 h-4 text-bb-muted"></i></button>
      </div>
      <template x-if="currentPage === 'tasks' || currentPage === 'today'">
        <div class="space-y-3">
          <input type="text" x-model="newTask.title" placeholder="タスク名" @keyup.enter="addTask()" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent transition-colors">
          <select x-model="newTask.businessId" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent">
            <option value="">事業を選択（任意）</option>
            <template x-for="biz in businesses" :key="biz.id"><option :value="biz.id" x-text="biz.icon + ' ' + biz.name"></option></template>
          </select>
          <template x-if="newTask.businessId && goalsForSelectedBusiness().length > 0">
            <select x-model="newTask.goalId" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent">
              <option value="">ゴールを選択（任意）</option>
              <template x-for="goal in goalsForSelectedBusiness()" :key="goal.id"><option :value="goal.id" x-text="goal.title"></option></template>
            </select>
          </template>
          <div class="flex gap-2">
            <select x-model="newTask.priority" class="flex-1 bg-bb-bg border border-bb-border rounded-xl px-3 py-3 text-sm outline-none focus:border-bb-accent">
              <option value="normal">普通</option><option value="high">高</option><option value="low">低</option>
            </select>
            <input type="date" x-model="newTask.dueDate" class="flex-1 bg-bb-bg border border-bb-border rounded-xl px-3 py-3 text-sm outline-none focus:border-bb-accent">
          </div>
          <button @click="addTask()" class="w-full bg-bb-accent text-white py-3 rounded-xl font-medium text-sm">追加する</button>
        </div>
      </template>
      <template x-if="currentPage === 'ideas'">
        <div class="space-y-3">
          <input type="text" x-model="newIdea.title" placeholder="アイデアのタイトル" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent transition-colors">
          <textarea x-model="newIdea.body" placeholder="詳細メモ（任意）" rows="3" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent resize-none"></textarea>
          <button @click="addIdea()" class="w-full bg-bb-accent text-white py-3 rounded-xl font-medium text-sm">保存する</button>
        </div>
      </template>
      <template x-if="currentPage === 'post'">
        <div class="space-y-3">
          <textarea x-model="newDraft.body" placeholder="投稿内容を書く..." rows="5" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent resize-none"></textarea>
          <div class="flex justify-end"><p class="text-xs" :class="newDraft.body.length > 280 ? 'text-bb-error' : 'text-bb-muted'" x-text="newDraft.body.length + '/280'"></p></div>
          <button @click="addDraft()" class="w-full bg-bb-accent text-white py-3 rounded-xl font-medium text-sm">下書き保存</button>
        </div>
      </template>
    </div>
  </div>

  <div x-show="showGoalModal" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end justify-center" @click.self="showGoalModal = false">
    <div x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0" class="w-full max-w-[430px] bg-white rounded-t-2xl p-5 shadow-card-md">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-bb-text">ゴールを設定</h3>
        <button @click="showGoalModal = false" class="w-7 h-7 flex items-center justify-center rounded-full bg-bb-bg"><i data-lucide="x" class="w-4 h-4 text-bb-muted"></i></button>
      </div>
      <div class="space-y-3">
        <input type="text" x-model="newGoal.title" placeholder="ゴール（例：3月末までに10社アポ獲得）" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent transition-colors">
        <select x-model="newGoal.businessId" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent">
          <option value="">事業を選択</option>
          <template x-for="biz in businesses" :key="biz.id"><option :value="biz.id" x-text="biz.icon + ' ' + biz.name"></option></template>
        </select>
        <div>
          <label class="text-xs text-bb-muted block mb-1.5">目標期限</label>
          <input type="date" x-model="newGoal.targetDate" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent">
        </div>
        <button @click="addGoal()" class="w-full bg-bb-accent text-white py-3 rounded-xl font-medium text-sm">ゴールを設定する</button>
      </div>
    </div>
  </div>

  <div x-show="showProgressModal" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center px-4" @click.self="showProgressModal = false">
    <div class="w-full max-w-[360px] bg-white rounded-2xl p-5 shadow-card-md">
      <h3 class="font-semibold text-bb-text mb-1">進捗を更新</h3>
      <p class="text-sm text-bb-muted mb-4 truncate" x-text="editingGoal?.title"></p>
      <div class="text-center mb-3"><span class="text-4xl font-bold text-bb-accent" x-text="editingProgress + '%'"></span></div>
      <input type="range" min="0" max="100" step="5" x-model="editingProgress" class="w-full mb-4">
      <div class="flex gap-2">
        <button @click="showProgressModal = false" class="flex-1 py-2.5 rounded-xl border border-bb-border text-sm text-bb-text2">キャンセル</button>
        <button @click="saveProgress()" class="flex-1 py-2.5 rounded-xl bg-bb-accent text-white font-medium text-sm">保存</button>
      </div>
    </div>
  </div>

  <div x-show="showBusinessModal" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end justify-center" @click.self="showBusinessModal = false">
    <div x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0" class="w-full max-w-[430px] bg-white rounded-t-2xl p-5 shadow-card-md">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-bb-text">事業を追加</h3>
        <button @click="showBusinessModal = false" class="w-7 h-7 flex items-center justify-center rounded-full bg-bb-bg"><i data-lucide="x" class="w-4 h-4 text-bb-muted"></i></button>
      </div>
      <div class="space-y-3">
        <div class="flex gap-2">
          <input type="text" x-model="newBusiness.icon" placeholder="🏢" maxlength="2" class="w-14 bg-bb-bg border border-bb-border rounded-xl px-3 py-3 text-center text-lg outline-none focus:border-bb-accent">
          <input type="text" x-model="newBusiness.name" placeholder="事業名" class="flex-1 bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent">
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-bb-muted">カラー</label>
          <input type="color" x-model="newBusiness.color" class="w-10 h-10 rounded-lg border border-bb-border cursor-pointer">
        </div>
        <button @click="addBusiness()" class="w-full bg-bb-accent text-white py-3 rounded-xl font-medium text-sm">追加する</button>
      </div>
    </div>
  </div>

  <div x-show="showMagicModal" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-end justify-center" @click.self="showMagicModal = false">
    <div x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0" class="w-full max-w-[430px] bg-white rounded-t-2xl p-5 shadow-card-md">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#F59E0B,#FBBF24)"><i data-lucide="sparkles" class="w-5 h-5 text-white"></i></div>
        <div><h3 class="font-semibold text-bb-text">Magic Project</h3><p class="text-[11px] text-bb-muted">AIがアイデアをタスクに分解</p></div>
        <button @click="showMagicModal = false" class="ml-auto w-7 h-7 flex items-center justify-center rounded-full bg-bb-bg"><i data-lucide="x" class="w-4 h-4 text-bb-muted"></i></button>
      </div>
      <div class="space-y-3">
        <textarea x-model="magicInput" placeholder="やりたいことを書いてください" rows="4" class="w-full bg-bb-bg border border-bb-border rounded-xl px-4 py-3 text-sm outline-none focus:border-bb-accent resize-none"></textarea>
        <template x-if="magicResult">
          <div class="bg-bb-bg border border-bb-border rounded-xl p-4">
            <p class="text-xs font-bold text-bb-accent mb-2" x-text="magicResult.projectName"></p>
            <p class="text-xs text-bb-muted mb-3" x-text="magicResult.summary"></p>
            <div class="space-y-1.5">
              <template x-for="(t, i) in magicResult.tasks" :key="i">
                <div class="flex items-center gap-2">
                  <div class="w-5 h-5 rounded-full bg-bb-accent/10 text-bb-accent text-[10px] flex items-center justify-center flex-shrink-0" x-text="i+1"></div>
                  <p class="text-xs text-bb-text" x-text="t.title"></p>
                </div>
              </template>
            </div>
            <button @click="adoptMagicResult()" class="w-full mt-3 bg-bb-success text-white py-2.5 rounded-xl text-sm font-medium">タスクに追加</button>
          </div>
        </template>
        <button @click="runMagicProject()" :disabled="magicLoading" class="w-full text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2 text-sm" style="background:linear-gradient(135deg,#F59E0B,#FBBF24)">
          <svg x-show="magicLoading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span x-text="magicLoading ? '生成中...' : 'AIでタスク生成'"></span>
        </button>
      </div>
    </div>
  </div>

  <div x-show="toast.show" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" :class="toast.type === 'error' ? 'bg-bb-error text-white' : 'bg-bb-text text-white'" class="fixed top-16 left-1/2 -translate-x-1/2 z-[100] px-4 py-2.5 rounded-xl text-sm shadow-card-md" x-text="toast.message"></div>

</div>

<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
